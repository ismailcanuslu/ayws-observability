version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# AYWS — Observability Stack
# Başlat: docker compose up -d
# Gereksinim: diğer servisler host üzerinde çalışıyor olmalı
# ─────────────────────────────────────────────────────────────────────────────

networks:
  ayws-internal:
    external: true       # security-compose tarafından oluşturulur

volumes:
  prometheus-data:
  loki-data:
  grafana-data:

services:

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ayws-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle        # POST /-/reload ile config yenilenir
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ayws-internal
    extra_hosts:
      - "host.docker.internal:host-gateway"   # host servislerine eriş

  # ── Loki ────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: ayws-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/tmp/loki
    ports:
      - "3100:3100"
    networks:
      - ayws-internal

  # ── Promtail (Docker log toplayıcı) ─────────────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: ayws-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - ayws-internal

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ayws-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - ayws-internal
