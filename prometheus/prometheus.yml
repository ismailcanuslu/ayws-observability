global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── AYWS Gateway ─────────────────────────────
  - job_name: ayws-gateway
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics

  # ── AYWS Security Service ─────────────────────
  - job_name: ayws-security-service
    static_configs:
      - targets: ["host.docker.internal:5001"]
    metrics_path: /metrics

  # ── Keycloak ──────────────────────────────────
  - job_name: keycloak
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /metrics
